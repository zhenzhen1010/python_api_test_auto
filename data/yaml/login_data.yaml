-
  id: login_001
  title: 登录成功
  method: POST
  url: /login
  header:
    Content-Type: application/json
    Accept-Language: zh
  param:
    principal: lemon_python
    credentials: 12345678
    appType: 3
    loginType: 0
  assertion:
    $..nickName: lemon_python
    $..enabled: true
  presql:
  extract_data:

